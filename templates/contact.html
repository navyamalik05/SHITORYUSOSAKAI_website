{% extends "base.html" %}

{% block title %}Contact - World Karate Dojo{% endblock %}

{% block content %}
<section class="contact-section">
    <div class="contact-container">
        <h1 class="section-title">CONTACT US</h1>
        <p class="section-subtitle">Get in touch with us today</p>
        
        <div class="form-message" style="display: none;"></div>
        
        <form id="contact-form">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone">
            </div>
            
            <div class="form-group">
                <label for="message">Message *</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary btn-large">SEND MESSAGE</button>
        </form>
        
        <div class="contact-info" style="margin-top: 3rem; text-align: center;">
            <h3>Other Ways to Reach Us</h3>
            <p>📞 (555) 123-4567</p>
            <p>✉️ info@worldkarate.com</p>
            <p>📍 123 Dojo Street, Your City, State 12345</p>
        </div>
    </div>
</section>
{% endblock %}
